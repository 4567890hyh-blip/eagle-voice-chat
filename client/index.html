<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Eagle Voice Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#0a0a0f;color:#fff}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#1a1a2e;padding:20px;border-radius:20px;margin-bottom:15px}
button,input{padding:10px;border-radius:20px;border:none}
button{background:#e94560;color:#fff;cursor:pointer}
.room{background:#2a2a4a;padding:10px;border-radius:10px;margin:5px 0;cursor:pointer}
.chat{height:250px;overflow:auto;background:#111;padding:10px;border-radius:10px;margin:10px 0}
</style>
</head>

<body>

<div class="container">

<div id="login">
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>الغرف</h3>
<div id="rooms"></div>
<input id="roomName" placeholder="اسم الغرفة">
<button onclick="createRoom()">إنشاء</button>
</div>

<div id="roomUI" style="display:none" class="card">
<h3 id="roomTitle"></h3>

<div id="chat" class="chat"></div>

<input id="msg">
<button onclick="sendMsg()">إرسال</button>

<br><br>

<button id="micBtn" onclick="toggleMic()">🎤 تشغيل المايك</button>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

let socket;
let token = localStorage.getItem("token");
let currentRoom = null;

let localStream = null;
let peers = {};
let isMic = false;

/* ================= LOGIN ================= */

async function login(){
    const res = await fetch('/api/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            username:user.value,
            password:pass.value
        })
    });

    const data = await res.json();

    if(data.success){
        token = data.token;
        localStorage.setItem("token",token);

        startApp();
    }else{
        alert(data.error);
    }
}

function startApp(){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    socket = io({auth:{token}});

    socket.on("rooms", renderRooms);
    socket.on("msg", addMsg);

    socket.on("webrtc-users", users=>{
        users.forEach(id=>createPeer(id,true));
    });

    socket.on("webrtc-offer", async ({from,offer})=>{
        const peer = createPeer(from,false);

        await peer.setRemoteDescription(offer);
        const ans = await peer.createAnswer();
        await peer.setLocalDescription(ans);

        socket.emit("webrtc-answer",{to:from,answer:ans});
    });

    socket.on("webrtc-answer", async ({from,answer})=>{
        await peers[from].setRemoteDescription(answer);
    });

    socket.on("webrtc-candidate", ({from,candidate})=>{
        peers[from].addIceCandidate(candidate);
    });

    loadRooms();
}

/* ================= ROOMS ================= */

async function loadRooms(){
    const res = await fetch('/api/rooms');
    const data = await res.json();
    renderRooms(data);
}

function renderRooms(list){
    const div = document.getElementById("rooms");
    div.innerHTML = "";

    list.forEach(r=>{
        const el = document.createElement("div");
        el.className="room";
        el.innerText=r.name;
        el.onclick=()=>joinRoom(r._id,r.name);
        div.appendChild(el);
    });
}

function createRoom(){
    socket.emit("create-room",{name:roomName.value});
}

function joinRoom(id,name){
    currentRoom=id;
    roomUI.style.display="block";
    roomTitle.innerText=name;

    socket.emit("join-room",{roomId:id});
}

/* ================= CHAT ================= */

function sendMsg(){
    socket.emit("msg",{roomId:currentRoom,text:msg.value});
    msg.value="";
}

function addMsg(m){
    chat.innerHTML += `<div>${m}</div>`;
}

/* ================= MIC + WEBRTC ================= */

async function toggleMic(){

    if(isMic){
        localStream.getTracks().forEach(t=>t.stop());
        isMic=false;
        micBtn.innerText="🎤 تشغيل المايك";
        return;
    }

    try{
        localStream = await navigator.mediaDevices.getUserMedia({audio:true});
        isMic=true;

        micBtn.innerText="🔇 إيقاف المايك";

        startWebRTC();

    }catch{
        alert("لازم تسمح بالمايك");
    }
}

function startWebRTC(){
    socket.emit("webrtc-join",{roomId:currentRoom});
}

function createPeer(id,init){

    const peer = new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    peers[id]=peer;

    localStream.getTracks().forEach(t=>{
        peer.addTrack(t,localStream);
    });

    peer.ontrack = e=>{
        const audio=document.createElement("audio");
        audio.srcObject=e.streams[0];
        audio.autoplay=true;
        document.body.appendChild(audio);
    };

    peer.onicecandidate = e=>{
        if(e.candidate){
            socket.emit("webrtc-candidate",{to:id,candidate:e.candidate});
        }
    };

    if(init){
        peer.createOffer().then(o=>{
            peer.setLocalDescription(o);
            socket.emit("webrtc-offer",{to:id,offer:o});
        });
    }

    return peer;
}

/* ================= AUTO LOGIN ================= */

if(token) startApp();

</script>

</body>
</html>
