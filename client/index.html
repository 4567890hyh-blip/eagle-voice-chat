<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Eagle Voice Chat - غرف صوتية حية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #0a0a0f; color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .card { background: #1a1a2e; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .flex { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        button, input { padding: 10px 15px; border-radius: 30px; border: none; }
        button { background: #e94560; color: white; cursor: pointer; }
        .room-item { background: #2a2a4a; padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .room-item:hover { background: #e94560; transform: scale(1.01); }
        .speaker-list { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; padding: 10px; background: #0f0f1a; border-radius: 40px; }
        .speaker { background: #2a2a4a; border-radius: 40px; padding: 5px 15px; display: inline-flex; align-items: center; gap: 8px; }
        .speaker.active { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .chat-box { height: 320px; overflow-y: auto; background: #0f0f1a; border-radius: 24px; padding: 15px; margin: 15px 0; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 40px; max-width: 85%; }
        .message-self { background: #e94560; align-self: flex-end; }
        .message-other { background: #2a2a4a; align-self: flex-start; }
        .message-system { background: rgba(255,193,7,0.2); align-self: center; width: 90%; text-align: center; font-style: italic; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; }
        .profile { display: flex; align-items: center; gap: 15px; }
        .profile-pic { width: 60px; height: 60px; border-radius: 50%; background-size: cover; background-position: center; background-color: #e94560; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .frame-border { border: 3px solid gold; box-shadow: 0 0 0 2px #e94560; }
        .mic-count { background: #1a1a2e; padding: 4px 12px; border-radius: 40px; font-size: 12px; }
        @media (max-width: 700px) { .container { padding: 12px; } .profile-pic { width: 45px; height: 45px; } }
        .toast { position: fixed; bottom: 20px; left: 20px; background: #1a1a2e; color: white; padding: 10px 18px; border-radius: 40px; border-left: 4px solid #e94560; z-index: 999; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🦅 Eagle Voice Chat</h1>
    <div class="sub">غرف صوتية | مايكات حية | إطارات وتأثيرات</div>

    <div id="loginSection" class="card">
        <h3>🔐 تسجيل الدخول</h3>
        <input type="text" id="loginUsername" placeholder="اسم المستخدم">
        <input type="password" id="loginPassword" placeholder="كلمة السر">
        <button onclick="login()">دخول</button>
        <button onclick="showRegister()" class="btn-secondary">إنشاء حساب</button>
    </div>

    <div id="registerSection" class="card" style="display:none">
        <h3>📝 حساب جديد</h3>
        <input type="text" id="regUsername" placeholder="اسم المستخدم">
        <input type="password" id="regPassword" placeholder="كلمة السر">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني (اختياري)">
        <button onclick="register()">تسجيل</button>
        <button onclick="showLogin()" class="btn-secondary">عودة</button>
    </div>

    <div id="appSection" style="display:none">
        <div class="card">
            <div class="flex" style="justify-content: space-between;">
                <div class="profile" id="profileInfo"></div>
                <div>
                    <button onclick="document.getElementById('avatarInput').click()">🖼️ تغيير الصورة</button>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this.files[0])">
                    <button onclick="openShop()">🛒 متجر الإطارات</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🏠 الغرف المتاحة</h3>
            <div id="roomsList"></div>
            <div class="flex" style="margin-top: 12px;">
                <input type="text" id="newRoomName" placeholder="اسم الغرفة الجديدة" style="flex:2">
                <input type="number" id="maxMics" placeholder="عدد المايكات" value="5" style="width:90px">
                <button onclick="createRoom()">➕ إنشاء غرفة</button>
            </div>
        </div>

        <div id="roomView" style="display:none">
            <div class="card">
                <div class="flex" style="justify-content: space-between;">
                    <h3 id="roomTitle">💬 الغرفة</h3>
                    <div>
                        <span id="micCount" class="mic-count">🎤 0/0</span>
                        <button id="lockMicsBtn" onclick="toggleLockMics()" style="display:none">🔒 قفل المايكات</button>
                        <button onclick="leaveRoom()" class="btn-danger">🚪 مغادرة</button>
                    </div>
                </div>
                <div class="speaker-list" id="speakersList"></div>
                <div class="chat-box" id="messages"></div>
                <div class="flex">
                    <input type="text" id="messageInput" placeholder="اكتب رسالة..." style="flex:3">
                    <button onclick="sendMessage()">📨 إرسال</button>
                    <button id="micBtn" onclick="toggleMic()" style="background:#28a745">🎤 رفع المايك</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let token = localStorage.getItem('token');
    let currentUser = null;
    let socket = null;
    let currentRoom = null;
    let isMicActive = false;
    let localStream = null;

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if (isError) toast.style.borderLeftColor = '#dc3545';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showRegister() { document.getElementById('loginSection').style.display = 'none'; document.getElementById('registerSection').style.display = 'block'; }
    function showLogin() { document.getElementById('registerSection').style.display = 'none'; document.getElementById('loginSection').style.display = 'block'; }

    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return showToast('يرجى إدخال البيانات', true);
        try {
            const res = await fetch('/api/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, deviceId: 'web_' + Date.now() })
            });
            const data = await res.json();
            if (data.success) {
                token = data.token;
                localStorage.setItem('token', token);
                currentUser = data.user;
                connectSocket();
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'block';
                updateProfileUI();
                loadRooms();
                initMicrophone();
            } else showToast(data.error || 'فشل الدخول', true);
        } catch (err) { showToast('خطأ في الاتصال بالخادم', true); }
    }

    async function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const email = document.getElementById('regEmail').value.trim();
        if (!username || !password) return showToast('املأ الحقول المطلوبة', true);
        try {
            const res = await fetch('/api/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, email, deviceId: 'web_' + Date.now() })
            });
            const data = await res.json();
            if (data.success) { showToast('تم التسجيل بنجاح'); showLogin(); }
            else showToast(data.error, true);
        } catch (err) { showToast('خطأ في الاتصال', true); }
    }

    function updateProfileUI() {
        const profileDiv = document.getElementById('profileInfo');
        const frameClass = currentUser.frame ? 'frame-border' : '';
        profileDiv.innerHTML = `
            <div class="profile-pic ${frameClass}" style="background-image: url(${currentUser.avatar}); background-size: cover;">👤</div>
            <div><strong>${currentUser.username}</strong><br>💰 ${currentUser.coins} | 💎 ${currentUser.diamonds}<br>🎭 تأثير: ${currentUser.entryEffect || 'عادي'}</div>
        `;
    }

    async function uploadAvatar(file) {
        if (!file) return;
        const formData = new FormData();
        formData.append('avatar', file);
        try {
            const res = await fetch('/api/upload-avatar', {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData
            });
            const data = await res.json();
            if (data.success) { currentUser.avatar = data.avatar; updateProfileUI(); showToast('تم تحديث الصورة'); }
            else showToast(data.error, true);
        } catch (err) { showToast('فشل رفع الصورة', true); }
    }

    async function initMicrophone() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log('🎤 ميكروفون جاهز');
        } catch (err) { console.warn('لا يمكن الوصول للميكروفون', err); showToast('لا يمكن الوصول للميكروفون', true); }
    }

    function connectSocket() {
        socket = io({ auth: { token }, transports: ['websocket', 'polling'] });
        socket.on('connect', () => console.log('Socket متصل'));
        socket.on('rooms-updated', () => loadRooms());
        socket.on('user-joined', (data) => addSystemMessage(`🎉 ${data.username} دخل الغرفة${data.entryEffect ? ` (${data.entryEffect})` : ''}`));
        socket.on('user-left', () => addSystemMessage(`👋 مستخدم غادر الغرفة`));
        socket.on('speaker-joined', (data) => { addSystemMessage(`🎤 ${data.username} رفع المايك`); updateSpeakersList(); });
        socket.on('speaker-removed', () => { addSystemMessage(`🔇 تم إنزال المايك`); updateSpeakersList(); });
        socket.on('speakers-list', () => updateSpeakersList());
        socket.on('mics-locked', (locked) => addSystemMessage(locked ? '🔒 المايكات مقفلة' : '🔓 المايكات مفتوحة'));
        socket.on('new-message', (msg) => addMessage(msg));
    }

    async function loadRooms() {
        try {
            const res = await fetch('/api/rooms');
            const rooms = await res.json();
            const container = document.getElementById('roomsList');
            if (!rooms.length) { container.innerHTML = '<p>✨ لا توجد غرف، كن أول من ينشئ غرفة!</p>'; return; }
            let html = '';
            for (const room of rooms) {
                const usersCount = room.users?.length || 0;
                const speakers = room.currentSpeakers?.length || 0;
                const maxMics = room.maxMicrophones || 5;
                html += `<div class="room-item" onclick="joinRoom('${room._id}', '${room.name}', '${room.ownerId}')">
                            <span>🏠 ${room.name}</span>
                            <span>👥 ${usersCount} | 🎤 ${speakers}/${maxMics}</span>
                        </div>`;
            }
            container.innerHTML = html;
        } catch (err) { console.error(err); document.getElementById('roomsList').innerHTML = '<p class="error">فشل تحميل الغرف</p>'; }
    }

    function createRoom() {
        const name = document.getElementById('newRoomName').value.trim();
        const maxMics = parseInt(document.getElementById('maxMics').value) || 5;
        if (!name) return showToast('أدخل اسم الغرفة', true);
        socket.emit('create-room', { name, maxMicrophones: maxMics }, (res) => {
            if (res.success) { showToast('تم إنشاء الغرفة'); loadRooms(); document.getElementById('newRoomName').value = ''; }
            else showToast(res.error, true);
        });
    }

    function joinRoom(roomId, roomName, ownerId) {
        if (currentRoom) leaveRoom();
        currentRoom = { id: roomId, name: roomName, ownerId };
        socket.emit('join-room', { roomId }, (res) => {
            if (res.success) {
                document.getElementById('roomView').style.display = 'block';
                document.getElementById('roomTitle').innerHTML = `💬 ${roomName}`;
                document.getElementById('messages').innerHTML = '';
                updateSpeakersList();
            } else showToast(res.error, true);
        });
    }

    function updateSpeakersList() {
        if (!currentRoom) return;
        socket.emit('get-room-state', { roomId: currentRoom.id }, (res) => {
            if (res) {
                const container = document.getElementById('speakersList');
                const speakers = res.currentSpeakers || [];
                if (speakers.length === 0) container.innerHTML = '<div class="speaker">لا يوجد متحدثون</div>';
                else container.innerHTML = speakers.map(uid => `<div class="speaker active">🎤 ${uid.substring(0,6)}</div>`).join('');
                document.getElementById('micCount').innerHTML = `🎤 ${speakers.length}/${res.maxMicrophones || 5}`;
                const isOwner = (res.ownerId === currentUser._id);
                document.getElementById('lockMicsBtn').style.display = isOwner ? 'inline-block' : 'none';
            }
        });
    }

    function toggleMic() {
        if (!currentRoom) return;
        if (isMicActive) {
            socket.emit('remove-speaker', { roomId: currentRoom.id, userId: currentUser._id });
            isMicActive = false;
            document.getElementById('micBtn').innerHTML = '🎤 رفع المايك';
            document.getElementById('micBtn').style.background = '#28a745';
        } else {
            socket.emit('request-mic', { roomId: currentRoom.id }, (res) => {
                if (res.success) {
                    isMicActive = true;
                    document.getElementById('micBtn').innerHTML = '🔇 كتم المايك';
                    document.getElementById('micBtn').style.background = '#dc3545';
                } else showToast(res.error, true);
            });
        }
    }

    function toggleLockMics() {
        if (!currentRoom) return;
        socket.emit('lock-mics', { roomId: currentRoom.id, locked: true }, (res) => {
            if (res.success) showToast('تم قفل المايكات');
        });
    }

    function sendMessage() {
        const msg = document.getElementById('messageInput').value.trim();
        if (!msg || !currentRoom) return;
        socket.emit('send-message', { roomId: currentRoom.id, message: msg });
        document.getElementById('messageInput').value = '';
    }

    function addMessage(msg) {
        const messagesDiv = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${msg.username === currentUser.username ? 'message-self' : 'message-other'}`;
        div.innerHTML = `<div class="msg-avatar" style="background-image: url(${msg.avatar || '/uploads/default-avatar.png'}); background-size: cover;"></div>
                         <div><strong>${msg.username}</strong><br>${msg.message}</div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addSystemMessage(text) {
        const messagesDiv = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'message message-system';
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function leaveRoom() {
        if (currentRoom) {
            socket.emit('leave-room', { roomId: currentRoom.id });
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            currentRoom = null;
        }
        document.getElementById('roomView').style.display = 'none';
        isMicActive = false;
        document.getElementById('micBtn').innerHTML = '🎤 رفع المايك';
        document.getElementById('micBtn').style.background = '#28a745';
    }

    function openShop() { alert('🚧 متجر الإطارات والتأثيرات قيد التطوير قريباً'); }

    if (token) { login(); }
</script>
</body>
    </html>
