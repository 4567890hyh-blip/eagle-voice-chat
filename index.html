<!DOCTYPE html>
<html>
<head>
    <title>Eagle Voice - Test</title>
</head>
<body>
    <h1>🦅 اختبار اتصال لوحة التحكم</h1>
    <pre id="result">جاري الاتصال بالخادم...</pre>

    <script>
        // هذا الكود سيختبر الاتصال بالخادم مباشرة
        fetch('/api/admin/stats', {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('result').innerHTML = '✅ الاتصال بالخادم ناجح! \n\n' + JSON.stringify(data, null, 2);
        })
        .catch(err => {
            document.getElementById('result').innerHTML = '❌ فشل الاتصال بالخادم: ' + err.message;
        });
    </script>
</body>
</html>
