<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Eagle Voice - لوحة التحكم</title>
    <style>
        body { font-family: system-ui; background: #0a0a0f; color: white; padding: 20px; }
        button { background: #e94560; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer; }
        pre { background: #1a1a2e; padding: 15px; border-radius: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🦅 Eagle Voice - لوحة التحكم</h1>
    <p>🔑 مرحباً <span id="username">...</span></p>
    
    <button onclick="loadData('users')">👥 عرض المستخدمين</button>
    <button onclick="loadData('stats')">📊 عرض الإحصائيات</button>
    <button onclick="logout()">🚪 تسجيل خروج</button>
    
    <pre id="result">اضغط على زر لعرض البيانات...</pre>

    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/'; }
        
        // عرض اسم المستخدم
        fetch('/api/user', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json())
            .then(data => {
                if (data.user) document.getElementById('username').innerText = data.user.username;
                else window.location.href = '/';
            })
            .catch(() => window.location.href = '/');
        
        async function loadData(type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = 'جاري التحميل...';
            
            try {
                let url = '';
                if (type === 'users') url = '/api/admin/users';
                else if (type === 'stats') url = '/api/admin/stats';
                
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                resultDiv.innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.innerText = 'خطأ: ' + error.message;
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
    </script>
</body>
</html>
