<!DOCTYPE html>
<html>
<head>
    <title>Eagle Voice - Test</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>🦅 اختبار اتصال لوحة التحكم</h1>
    <button onclick="testConnection()">اختبار الاتصال بالخادم</button>
    <pre id="result">اضغط على الزر لاختبار الاتصال...</pre>

    <script>
        const token = localStorage.getItem('token');
        
        if (!token) {
            document.getElementById('result').innerHTML = '❌ لا يوجد توكن. الرجاء تسجيل الدخول أولاً.';
        }
        
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'جاري الاتصال...';
            
            try {
                // اختبار 1: الاتصال الأساسي
                const testRes = await fetch('/api/test');
                const testData = await testRes.json();
                resultDiv.innerHTML = '✅ الخادم يعمل: ' + JSON.stringify(testData, null, 2) + '\n\n';
                
                // اختبار 2: جلب بيانات المستخدم
                const userRes = await fetch('/api/user', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const userData = await userRes.json();
                resultDiv.innerHTML += '✅ بيانات المستخدم: ' + JSON.stringify(userData, null, 2) + '\n\n';
                
                // اختبار 3: جلب الإحصائيات
                const statsRes = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const statsData = await statsRes.json();
                resultDiv.innerHTML += '✅ الإحصائيات: ' + JSON.stringify(statsData, null, 2);
                
            } catch (error) {
                resultDiv.innerHTML = '❌ خطأ في الاتصال: ' + error.message;
            }
        }
    </script>
</body>
</html>
