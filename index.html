<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Voice - لوحة التحكم الكاملة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #0a0a0f; color: white; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #e94560; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1a1a2e; border-radius: 15px; padding: 20px; border: 1px solid #2a2a4a; }
        .card h3 { margin-bottom: 15px; color: #e94560; border-bottom: 1px solid #2a2a4a; padding-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a4a; border: none; border-radius: 8px; color: white; }
        button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        button:hover { opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; text-align: right; border-bottom: 1px solid #2a2a4a; }
        th { background: #e94560; }
        .stat { display: inline-block; margin: 5px; padding: 10px; background: #2a2a4a; border-radius: 8px; min-width: 120px; text-align: center; }
        .stat h4 { color: #e94560; font-size: 20px; }
        .danger { background: #dc3545; }
        .success { background: #28a745; }
        .warning { background: #ffc107; color: black; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1a1a2e; padding: 30px; border-radius: 15px; width: 400px; max-width: 90%; }
        .close { float: left; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>
    <h1>🦅 Eagle Voice - لوحة التحكم الرئيسية</h1>
    
    <div class="grid">
        <!-- الإحصائيات -->
        <div class="card">
            <h3>📊 الإحصائيات</h3>
            <div id="stats"></div>
        </div>
        
        <!-- المستخدمين -->
        <div class="card">
            <h3>👥 المستخدمين</h3>
            <input type="text" id="searchUser" placeholder="بحث...">
            <button onclick="loadUsers()">🔍 بحث</button>
            <div style="overflow-x: auto;"><table id="usersTable"><tr><td colspan="7">جاري التحميل...</td></tr></table></div>
        </div>
        
        <!-- نظام VIP -->
        <div class="card">
            <h3>👑 نظام VIP</h3>
            <input type="text" id="vipUsername" placeholder="اسم المستخدم">
            <select id="vipLevelSelect">
                <option value="1">VIP 1 (100 عملة)</option>
                <option value="2">VIP 2 (300 عملة)</option>
                <option value="3">VIP 3 (600 عملة)</option>
                <option value="4">VIP 4 (1000 عملة)</option>
                <option value="5">VIP 5 (2000 عملة)</option>
            </select>
            <div class="flex">
                <button onclick="giveVIP()">🎁 إعطاء VIP</button>
                <button onclick="loadVIPRanking()">🏆 ترتيب VIP</button>
            </div>
            <div id="vipRanking" style="margin-top: 10px; max-height: 200px; overflow-y: auto;"></div>
        </div>
        
        <!-- الهدايا -->
        <div class="card">
            <h3>🎁 الهدايا</h3>
            <div class="flex">
                <button onclick="showAddGiftModal()">➕ إضافة هدية</button>
                <button onclick="loadGifts()">🔄 تحديث</button>
            </div>
            <div style="overflow-x: auto;"><table id="giftsTable"><tr><td>جاري التحميل...</td></tr></table></div>
        </div>
        
        <!-- الألعاب -->
        <div class="card">
            <h3>🎮 الألعاب</h3>
            <div id="gamesInfo"></div>
            <button onclick="loadGames()">🔄 تحديث الإعدادات</button>
        </div>
        
        <!-- المخالفات -->
        <div class="card">
            <h3>⚠️ المخالفات</h3>
            <input type="text" id="warnUsername" placeholder="اسم المستخدم">
            <input type="text" id="warnReason" placeholder="سبب التحذير">
            <button onclick="addWarning()">⚠️ إضافة تحذير</button>
            <div id="warningsInfo"></div>
        </div>
        
        <!-- السحوبات -->
        <div class="card">
            <h3>💰 السحوبات</h3>
            <button onclick="loadWithdrawals()">🔄 تحديث</button>
            <div style="overflow-x: auto;"><table id="withdrawalsTable"><tr><td>جاري التحميل...</td></tr></table></div>
        </div>
        
        <!-- الوكالات -->
        <div class="card">
            <h3>🏢 الوكالات</h3>
            <input type="text" id="agencyName" placeholder="اسم الوكالة">
            <button onclick="createAgency()">➕ إنشاء وكالة</button>
            <button onclick="loadAgencies()">🔄 تحديث</button>
            <div style="overflow-x: auto;"><table id="agenciesTable"><tr><td>جاري التحميل...</td></tr></table></div>
        </div>
        
        <!-- شاشة الظهور -->
        <div class="card">
            <h3>🖼️ شاشة الظهور</h3>
            <input type="text" id="splashImage" placeholder="رابط الصورة">
            <input type="number" id="splashDuration" placeholder="المدة (ثواني)" value="3">
            <button onclick="addSplash()">➕ إضافة شاشة ظهور</button>
            <button onclick="loadSplash()">🔄 تحديث</button>
            <div id="splashList"></div>
        </div>
        
        <!-- الفعاليات -->
        <div class="card">
            <h3>🎉 الفعاليات</h3>
            <input type="text" id="eventName" placeholder="اسم الفعالية">
            <select id="eventType">
                <option value="competition">مسابقة</option>
                <option value="bonus">بونص</option>
                <option value="gift">هدية</option>
            </select>
            <button onclick="addEvent()">➕ إضافة فعالية</button>
            <button onclick="loadEvents()">🔄 تحديث</button>
            <div id="eventsList"></div>
        </div>
        
        <!-- البانرات -->
        <div class="card">
            <h3>📢 البانرات</h3>
            <input type="text" id="bannerImage" placeholder="رابط الصورة">
            <input type="text" id="bannerLink" placeholder="رابط عند الضغط">
            <button onclick="addBanner()">➕ إضافة بانر</button>
            <button onclick="loadBanners()">🔄 تحديث</button>
            <div id="bannersList"></div>
        </div>
        
        <!-- إعدادات الشحن -->
        <div class="card">
            <h3>💰 أسعار الشحن</h3>
            <div id="packagesList"></div>
            <button onclick="loadPackages()">🔄 تحديث</button>
        </div>
    </div>
    
    <!-- Modal إضافة هدية -->
    <div id="addGiftModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addGiftModal')">&times;</span>
            <h3>➕ إضافة هدية جديدة</h3>
            <input type="text" id="giftName" placeholder="اسم الهدية">
            <input type="number" id="giftPrice" placeholder="السعر">
            <label><input type="checkbox" id="giftIsLucky"> هدية حظ</label>
            <input type="number" id="giftWinChance" placeholder="نسبة الفوز (1-100)" value="10">
            <button onclick="addGift()">إضافة</button>
        </div>
    </div>

    <script>
        const API_URL = '';
        let token = localStorage.getItem('token');
        
        if (!token) { window.location.href = '/'; }
        
        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/api/admin/stats`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                document.getElementById('stats').innerHTML = `
                    <div class="stat"><h4>${data.stats?.totalUsers || 0}</h4><p>المستخدمين</p></div>
                    <div class="stat"><h4>${data.stats?.onlineUsers || 0}</h4><p>متصلون</p></div>
                    <div class="stat"><h4>${data.stats?.totalCoins || 0}</h4><p>العملات</p></div>
                    <div class="stat"><h4>${data.stats?.totalRevenue || 0} $</h4><p>الإيرادات</p></div>
                `;
            } catch(e) { console.error(e); }
        }
        
        async function loadUsers() {
            const search = document.getElementById('searchUser').value;
            const res = await fetch(`${API_URL}/api/admin/users?search=${search}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            let html = '<tr><th>المستخدم</th><th>الدور</th><th>VIP</th><th>العملات</th><th>الألماس</th><th>المخاطر</th><th>الحالة</th><th>إجراءات</th></tr>';
            (data.users || []).forEach(u => {
                html += `<tr>
                    <td>${u.username}</td>
                    <td>${u.role === 'super_admin' ? 'سوبر ادمن' : (u.role === 'admin' ? 'ادمن' : 'مستخدم')}</td>
                    <td>${u.vipLevel > 0 ? `VIP ${u.vipLevel}` : '-'}</td>
                    <td>💰 ${u.coins}</td>
                    <td>💎 ${u.diamonds}</td>
                    <td style="color:${u.riskScore > 70 ? 'red' : (u.riskScore > 30 ? 'orange' : 'green')}">${u.riskScore}%</td>
                    <td>${u.isBanned ? '🚫 محظور' : '✅ نشط'}</td>
                    <td>
                        <button onclick="giveVIPToUser('${u._id}', '${u.username}')">👑</button>
                        <button onclick="banUser('${u._id}')">🔨</button>
                    </td>
                </tr>`;
            });
            document.getElementById('usersTable').innerHTML = html;
        }
        
        async function giveVIP() {
            const username = document.getElementById('vipUsername').value;
            const level = document.getElementById('vipLevelSelect').value;
            if (!username) { alert('أدخل اسم المستخدم'); return; }
            await fetch(`${API_URL}/api/admin/give-vip`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ username, level: parseInt(level), days: 30 }) });
            alert('تمت الترقية');
            loadUsers();
            loadVIPRanking();
        }
        
        async function giveVIPToUser(userId, username) {
            const level = prompt(`مستوى VIP للمستخدم ${username} (1-5):`);
            if (!level || level < 1 || level > 5) return;
            await fetch(`${API_URL}/api/admin/give-vip`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ userId, level: parseInt(level), days: 30 }) });
            alert('تمت الترقية');
            loadUsers();
            loadVIPRanking();
        }
        
        async function loadVIPRanking() {
            const res = await fetch(`${API_URL}/api/vip/ranking`);
            const users = await res.json();
            let html = '<table><tr><th>#</th><th>المستخدم</th><th>المستوى</th><th>العملات</th></tr>';
            (users || []).forEach((u, i) => { html += `<tr><td>${i+1}</td><td>${u.username}</td><td>VIP ${u.vipLevel}</td><td>💰 ${u.coins}</td></tr>`; });
            html += '</table>';
            document.getElementById('vipRanking').innerHTML = html;
        }
        
        async function banUser(userId) {
            const reason = prompt('سبب الحظر:');
            if (!reason) return;
            await fetch(`${API_URL}/api/admin/ban-user`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ userId, reason }) });
            loadUsers();
        }
        
        async function addWarning() {
            const username = document.getElementById('warnUsername').value;
            const reason = document.getElementById('warnReason').value;
            if (!username || !reason) { alert('أدخل اسم المستخدم وسبب التحذير'); return; }
            const usersRes = await fetch(`${API_URL}/api/admin/users?search=${username}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const usersData = await usersRes.json();
            const user = usersData.users.find(u => u.username === username);
            if (!user) { alert('المستخدم غير موجود'); return; }
            const res = await fetch(`${API_URL}/api/admin/warnings/add`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ userId: user._id, reason, action: 'warn' }) });
            const result = await res.json();
            alert(`تم إضافة تحذير. درجة المخاطرة: ${result.riskScore}%`);
            loadUsers();
        }
        
        async function loadGifts() {
            const res = await fetch(`${API_URL}/api/admin/gifts`, { headers: { 'Authorization': `Bearer ${token}` } });
            const gifts = await res.json();
            let html = '<tr><th>الاسم</th><th>السعر</th><th>النوع</th><th>نسبة الفوز</th><th>حذف</th></tr>';
            (gifts || []).forEach(g => {
                html += `<tr>
                    <td>${g.name}</td>
                    <td>${g.price}</td>
                    <td>${g.isLuckyGift ? '🎲 حظ' : '🎁 عادي'}</td>
                    <td>${g.isLuckyGift ? g.winChance + '%' : '-'}</td>
                    <td><button onclick="deleteGift('${g._id}')">🗑️</button></td>
                </tr>`;
            });
            document.getElementById('giftsTable').innerHTML = html;
        }
        
        async function deleteGift(giftId) {
            if (!confirm('حذف الهدية؟')) return;
            await fetch(`${API_URL}/api/admin/gifts/${giftId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            loadGifts();
        }
        
        async function addGift() {
            const data = {
                name: document.getElementById('giftName').value,
                price: parseInt(document.getElementById('giftPrice').value),
                isLuckyGift: document.getElementById('giftIsLucky').checked,
                winChance: parseInt(document.getElementById('giftWinChance').value) || 10
            };
            if (!data.name || !data.price) { alert('أدخل اسم الهدية والسعر'); return; }
            await fetch(`${API_URL}/api/admin/gifts`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
            alert('تم إضافة الهدية');
            closeModal('addGiftModal');
            loadGifts();
        }
        
        async function loadGames() {
            const res = await fetch(`${API_URL}/api/admin/games`, { headers: { 'Authorization': `Bearer ${token}` } });
            const games = await res.json();
            let html = '';
            (games || []).forEach(g => {
                html += `<div style="margin:10px 0; padding:10px; background:#2a2a4a; border-radius:8px;">
                    <strong>${g.name}</strong><br>
                    نسبة ربح الإدارة: ${g.houseEdge}%<br>
                    حماية AI: ${g.aiProtectionEnabled ? '✅ مفعل' : '❌ معطل'}<br>
                    الحد الأدنى: ${g.minBet} | الحد الأعلى: ${g.maxBet}
                </div>`;
            });
            document.getElementById('gamesInfo').innerHTML = html || '<p>لا توجد ألعاب</p>';
        }
        
        async function loadWithdrawals() {
            const res = await fetch(`${API_URL}/api/admin/withdrawals`, { headers: { 'Authorization': `Bearer ${token}` } });
            const withdrawals = await res.json();
            let html = '<tr><th>المستخدم</th><th>المبلغ</th><th>الطريقة</th><th>الحالة</th><th>التاريخ</th><th>إجراءات</th></tr>';
            (withdrawals || []).forEach(w => {
                html += `<tr>
                    <td>${w.userId?.username || '-'}</td>
                    <td>$${w.amount}</td>
                    <td>${w.method}</td>
                    <td>${w.status === 'pending' ? '⏳ قيد المراجعة' : '✅ مكتمل'}</td>
                    <td>${new Date(w.createdAt).toLocaleDateString()}</td>
                    <td>${w.status === 'pending' ? `<button onclick="approveWithdrawal('${w._id}')">موافقة</button>` : '-'}</td>
                </tr>`;
            });
            document.getElementById('withdrawalsTable').innerHTML = html;
        }
        
        async function approveWithdrawal(id) {
            if (!confirm('الموافقة على طلب السحب؟')) return;
            await fetch(`${API_URL}/api/admin/withdrawals/${id}/approve`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
            loadWithdrawals();
        }
        
        async function createAgency() {
            const name = document.getElementById('agencyName').value;
            if (!name) { alert('أدخل اسم الوكالة'); return; }
            await fetch(`${API_URL}/api/agency/create`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ name }) });
            alert('تم إنشاء الوكالة');
            loadAgencies();
        }
        
        async function loadAgencies() {
            const res = await fetch(`${API_URL}/api/agencies`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            let html = '<tr><th>الاسم</th><th>المالك</th><th>تاريخ الإنشاء</th></tr>';
            (data.agencies || []).forEach(a => {
                html += `<tr><td>${a.name}</td><td>${a.ownerId?.username || '-'}</td><td>${new Date(a.createdAt).toLocaleDateString()}</td></tr>`;
            });
            document.getElementById('agenciesTable').innerHTML = html;
        }
        
        async function addSplash() {
            const imageUrl = document.getElementById('splashImage').value;
            const duration = parseInt(document.getElementById('splashDuration').value);
            if (!imageUrl) { alert('أدخل رابط الصورة'); return; }
            await fetch(`${API_URL}/api/admin/splash`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ imageUrl, duration, isActive: true, startDate: new Date(), endDate: new Date(Date.now() + 30*24*60*60*1000) }) });
            alert('تم إضافة شاشة الظهور');
            loadSplash();
        }
        
        async function loadSplash() {
            const res = await fetch(`${API_URL}/api/admin/splash`, { headers: { 'Authorization': `Bearer ${token}` } });
            const splashes = await res.json();
            let html = '<table><tr><th>الصورة</th><th>المدة</th><th>الحالة</th></tr>';
            (splashes || []).forEach(s => {
                html += `<tr><td><img src="${s.imageUrl}" width="40"></td><td>${s.duration} ثانية</td><td>${s.isActive ? 'نشط' : 'غير نشط'}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('splashList').innerHTML = html;
        }
        
        async function addEvent() {
            const name = document.getElementById('eventName').value;
            const type = document.getElementById('eventType').value;
            if (!name) { alert('أدخل اسم الفعالية'); return; }
            await fetch(`${API_URL}/api/admin/events`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ name, type, isActive: true, startDate: new Date(), endDate: new Date(Date.now() + 7*24*60*60*1000) }) });
            alert('تم إضافة الفعالية');
            loadEvents();
        }
        
        async function loadEvents() {
            const res = await fetch(`${API_URL}/api/admin/events`, { headers: { 'Authorization': `Bearer ${token}` } });
            const events = await res.json();
            let html = '<table><tr><th>الاسم</th><th>النوع</th><th>الحالة</th></tr>';
            (events || []).forEach(e => {
                html += `<tr><td>${e.name}</td><td>${e.type}</td><td>${e.isActive ? 'نشط' : 'غير نشط'}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('eventsList').innerHTML = html;
        }
        
        async function addBanner() {
            const imageUrl = document.getElementById('bannerImage').value;
            const linkUrl = document.getElementById('bannerLink').value;
            if (!imageUrl) { alert('أدخل رابط الصورة'); return; }
            await fetch(`${API_URL}/api/admin/banners`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ imageUrl, linkUrl, isActive: true }) });
            alert('تم إضافة البانر');
            loadBanners();
        }
        
        async function loadBanners() {
            const res = await fetch(`${API_URL}/api/admin/banners`, { headers: { 'Authorization': `Bearer ${token}` } });
            const banners = await res.json();
            let html = '<table><tr><th>الصورة</th><th>الرابط</th><th>الحالة</th></tr>';
            (banners || []).forEach(b => {
                html += `<tr><td><img src="${b.imageUrl}" width="40"></td><td>${b.linkUrl || '-'}</td><td>${b.isActive ? 'نشط' : 'غير نشط'}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('bannersList').innerHTML = html;
        }
        
        async function loadPackages() {
            const res = await fetch(`${API_URL}/api/packages`);
            const packages = await res.json();
            let html = '<table><tr><th>الباقة</th><th>السعر</th><th>العملات</th></tr>';
            for (const [key, pkg] of Object.entries(packages)) {
                html += `<tr><td>${key}</td><td>$${pkg.price}</td><td>💰 ${pkg.coins}</td></tr>`;
            }
            html += '</table>';
            document.getElementById('packagesList').innerHTML = html;
        }
        
        function showAddGiftModal() { document.getElementById('addGiftModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        loadStats();
        loadUsers();
        loadGifts();
        loadGames();
        loadWithdrawals();
        loadAgencies();
        loadPackages();
    </script>
</body>
</html>
