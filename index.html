<div style="position: fixed; bottom: 10px; left: 10px; z-index: 9999; background: #1a1a2e; padding: 10px; border-radius: 12px; border: 1px solid #e94560; font-size: 12px;">
    <button onclick="testUsers()" style="background: #e94560; border: none; padding: 5px 10px; border-radius: 6px; color: white;">📋 اختبار المستخدمين</button>
    <button onclick="testStats()" style="background: #17a2b8; border: none; padding: 5px 10px; border-radius: 6px; color: white;">📊 اختبار الإحصائيات</button>
    <button onclick="testToken()" style="background: #ffc107; border: none; padding: 5px 10px; border-radius: 6px; color: black;">🔑 فحص التوكن</button>
</div>

<script>
    const API_URL = '';
    let token = localStorage.getItem('token');

    async function testUsers() {
        if (!token) { alert('❌ لا يوجد توكن! الرجاء تسجيل الدخول'); return; }
        try {
            const res = await fetch(`${API_URL}/api/admin/users`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.users) {
                alert(`✅ نجح! عدد المستخدمين: ${data.users.length}\nأول مستخدم: ${data.users[0]?.username || 'لا يوجد'}`);
            } else {
                alert(`⚠️ استجابة غير متوقعة:\n${JSON.stringify(data).substring(0, 200)}`);
            }
        } catch (err) {
            alert(`❌ خطأ في الاتصال: ${err.message}`);
        }
    }

    async function testStats() {
        if (!token) { alert('❌ لا يوجد توكن!'); return; }
        try {
            const res = await fetch(`${API_URL}/api/admin/stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.stats) {
                alert(`✅ الإحصائيات:\nالمستخدمين: ${data.stats.totalUsers}\nالعملات: ${data.stats.totalCoins}\nالإيرادات: ${data.stats.totalRevenue}$`);
            } else {
                alert(`⚠️ استجابة غير متوقعة:\n${JSON.stringify(data).substring(0, 200)}`);
            }
        } catch (err) {
            alert(`❌ خطأ: ${err.message}`);
        }
    }

    function testToken() {
        if (!token) {
            alert('❌ لا يوجد توكن في localStorage');
            return;
        }
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            const exp = payload.exp * 1000;
            const now = Date.now();
            if (exp < now) {
                alert(`❌ التوكن منتهي الصلاحية منذ ${Math.floor((now - exp) / 1000)} ثانية`);
            } else {
                const days = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
                alert(`✅ التوكن صالح لمدة ${days} يوم\nاسم المستخدم: ${payload.userId || 'غير معروف'}`);
            }
        } catch(e) {
            alert(`❌ التوكن تالف: ${e.message}`);
        }
    }
</script>
