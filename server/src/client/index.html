<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Eagle Voice Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63); color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; width: calc(100% - 10px); }
        button { background: #e94560; color: white; cursor: pointer; }
        .room { background: rgba(255,255,255,0.1); padding: 10px; margin: 5px 0; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦅 Eagle Voice Chat</h1>
        
        <div id="loginSection" class="card">
            <h3>تسجيل الدخول</h3>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم">
            <input type="password" id="loginPassword" placeholder="كلمة السر">
            <button onclick="login()">دخول</button>
            <button onclick="showRegister()">إنشاء حساب</button>
        </div>
        
        <div id="registerSection" class="card" style="display:none">
            <h3>إنشاء حساب</h3>
            <input type="text" id="regUsername" placeholder="اسم المستخدم">
            <input type="password" id="regPassword" placeholder="كلمة السر">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <button onclick="register()">تسجيل</button>
            <button onclick="showLogin()">عودة</button>
        </div>
        
        <div id="appSection" style="display:none">
            <div class="card" id="userInfo"></div>
            <div class="card">
                <h3>الغرف</h3>
                <div id="roomsList"></div>
                <input type="text" id="newRoomName" placeholder="اسم الغرفة الجديدة">
                <button onclick="createRoom()">➕ إنشاء غرفة</button>
            </div>
            <div class="card" id="chatSection" style="display:none">
                <h3 id="currentRoom"></h3>
                <div id="messages" style="height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px;"></div>
                <input type="text" id="messageInput" placeholder="اكتب رسالة...">
                <button onclick="sendMessage()">إرسال</button>
                <button onclick="leaveRoom()">🚪 مغادرة</button>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let token = localStorage.getItem('token');
        let currentUser = null;
        let currentRoomId = null;
        
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                token = data.token;
                localStorage.setItem('token', token);
                currentUser = data.user;
                connectSocket();
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'block';
                document.getElementById('userInfo').innerHTML = `👋 مرحباً ${currentUser.username} | 💰 ${currentUser.coins} | 💎 ${currentUser.diamonds}`;
                loadRooms();
            } else alert(data.error);
        }
        
        async function register() {
            const data = {
                username: document.getElementById('regUsername').value,
                password: document.getElementById('regPassword').value,
                email: document.getElementById('regEmail').value
            };
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) { alert('تم التسجيل بنجاح'); showLogin(); }
            else alert(result.error);
        }
        
        function connectSocket() {
            socket = io({ auth: { token } });
            socket.on('connect', () => console.log('✅ متصل'));
            socket.on('rooms-updated', () => loadRooms());
            socket.on('user-joined', (username) => addMessage(`⚡ ${username} دخل الغرفة`, 'system'));
            socket.on('new-message', (data) => addMessage(`${data.username}: ${data.message}`, 'user'));
        }
        
        async function loadRooms() {
            const res = await fetch('/api/rooms');
            const rooms = await res.json();
            document.getElementById('roomsList').innerHTML = rooms.map(r => `<div class="room" onclick="joinRoom('${r._id}', '${r.name}')">🏠 ${r.name}</div>`).join('');
        }
        
        function createRoom() {
            const name = document.getElementById('newRoomName').value;
            if (!name) return;
            socket.emit('create-room', { name }, (res) => {
                if (res.success) { alert('تم إنشاء الغرفة'); loadRooms(); }
                else alert(res.error);
            });
        }
        
        function joinRoom(roomId, roomName) {
            currentRoomId = roomId;
            socket.emit('join-room', { roomId });
            document.getElementById('chatSection').style.display = 'block';
            document.getElementById('currentRoom').innerText = `💬 غرفة: ${roomName}`;
            document.getElementById('messages').innerHTML = '';
        }
        
        function sendMessage() {
            const msg = document.getElementById('messageInput').value;
            if (!msg || !currentRoomId) return;
            socket.emit('send-message', { roomId: currentRoomId, message: msg });
            document.getElementById('messageInput').value = '';
            addMessage(`أنت: ${msg}`, 'self');
        }
        
        function leaveRoom() {
            currentRoomId = null;
            document.getElementById('chatSection').style.display = 'none';
        }
        
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.padding = '5px';
            div.style.margin = '5px';
            div.style.borderRadius = '8px';
            div.style.background = type === 'system' ? 'rgba(255,193,7,0.3)' : (type === 'self' ? '#e94560' : 'rgba(255,255,255,0.1)');
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
        
        function showRegister() { document.getElementById('loginSection').style.display = 'none'; document.getElementById('registerSection').style.display = 'block'; }
        function showLogin() { document.getElementById('registerSection').style.display = 'none'; document.getElementById('loginSection').style.display = 'block'; }
        
        if (token) { document.getElementById('loginSection').style.display = 'none'; document.getElementById('appSection').style.display = 'block'; login(); }
    </script>
</body>
  </html>
